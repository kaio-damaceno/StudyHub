<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Carregando...</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: #0a0e27;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            -webkit-app-region: drag;
            position: relative;
        }
        img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            position: absolute;
            top: 0;
            left: 0;
            z-index: 1;
        }
        .loading-text {
            position: absolute;
            z-index: 2;
            color: white;
            font-size: 48px;
            font-family: 'Inter', system-ui, sans-serif;
            font-weight: bold;
            text-shadow: 0 4px 20px rgba(0,0,0,0.8);
            letter-spacing: 2px;
            bottom: 15%;
            animation: pulse 2s infinite;
        }
        @keyframes pulse {
            0% { opacity: 0.6; }
            50% { opacity: 1; }
            100% { opacity: 0.6; }
        }
    </style>
</head>
<body>
    <img src="assets/loading.gif" alt="Loading">
    <div class="loading-text">carregando...</div>
</body>
</html>
